<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mondrian Project</title>
    <style>
      /* 
                            Write your CSS here 
                                Gap Colour: #000
                                    White: #F0F1EC
                                        Red: #E72F24
                                            Black: #232629
                                                Blue: #004592
                                                    Yellow: #F9D01E
                                                    
                                                        For dimensions, see dimensions.png image.
                                                            HINT: Remember you can't change the properties of grid lines.
                                                                But grid lines are transparent!
                                                                    */
      .grid-container {
        width: 748px;
        height: 748px;
        display: grid;
        background-color: black;
        grid-template-columns: 320px 198px 153px 50px;
        grid-template-rows: 414px 130px 155px 22px;
        gap: 9px;
      }

      .white {
        background-color: rgb(244, 219, 219);
      }

      .red {
        background-color: red;
      }
      .two {
        grid-column: span 3;
      }

      .three{
        grid-row: span 2;
      }

      .four{
        grid-column: span 2;
        grid-row: span 2;
      }

      .five{
        background-color: blue;
        border-bottom: 10px solid black;
      }

      .yellow{
        background-color: yellow;
      }
      .six{
        grid-row: span 2;
      }
    </style>
  </head>

  <body>
    <!-- Write your HTML here -->
    <div class="grid-container">
      <div class="one red"></div>
      <div class="two white"></div>
      <div class="three white"></div>
      <div class="four white"></div>
      <div class="five blue"></div>
      <div class="six white"></div>
      <div class="seven white"></div>
      <div class="eight yellow"></div>
      <div class="nine black"></div>
    </div>
  </body>
</html>
